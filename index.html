<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Code Playground</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/prismjs/themes/prism-tomorrow.css" rel="stylesheet" />

</head>

<body>

<header>
    <h1>💻 Smart Code Playground</h1>
    <p>Write, Run & Learn with Intelligent AI Hints</p>
</header>

<div class="container">

    <div class="editor">
        <pre class="editor-box">
<code id="code" contenteditable="true" class="language-javascript">
// Write your JavaScript code here
console.log("Hello World");
</code>
</pre>

        <div class="buttons">

            <button class="run" onclick="runCode()">▶ Run Code</button>
            <button class="hint" onclick="getHint()">💡 Get Hint</button>
            <button class="copy-btn" onclick="copyCode()">📋 Copy Code</button>
            <button onclick="explainCode()">🧠 Explain Code</button>
            <button onclick="giveChallenge()">🎮 Challenge</button>
        </div>
    </div>

    <div class="output" id="output">
        Output will appear here...
    </div>

</div>

<footer class="footer">
    Made by <strong>Anvesha Mishra</strong> 🚀 |
    <a href="https://www.linkedin.com/in/anvesha-mishra07/" target="_blank">LinkedIn Profile</a>
</footer>

<script src="script.js"></script>

<script src="https://cdn.jsdelivr.net/npm/prismjs/prism.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-javascript.min.js"></script>
</body>
</html>
