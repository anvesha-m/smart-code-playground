<!DOCTYPE html>
<html>
<head>
  <title>Smart Code Playground</title>

  <!-- CodeMirror -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
  <h1>💻 Smart Code Playground</h1>
  <p>Write, Run & Learn with Intelligent AI Hints</p>
</div>

<div class="editor-box">
  <textarea id="code">
// Write your JavaScript code here
console.log("Hello World");
  </textarea>

  <div class="buttons">
    <button onclick="runCode()" class="run">▶ Run Code</button>
    <button onclick="getHint()" class="hint">💡 Get Hint</button>
    <button onclick="copyCode()" class="copy">📋 Copy Code</button>
    <button onclick="explainCode()" class="explain">🧠 Explain Code</button>
    <button onclick="loadChallenge()" class="challenge">🎮 Challenge</button>
  </div>
</div>

<div class="output-box">
  <h3>Output</h3>
  <pre id="output">Output will appear here...</pre>
</div>

<div class="output-box">
  <h3>AI Explanation</h3>
  <pre id="explanation"></pre>
</div>

<div class="output-box">
  <h3>Hints & Suggestions</h3>
  <pre id="hints"></pre>
</div>

<div class="output-box">
  <h3>Challenge</h3>
  <pre id="challengeText"></pre>
</div>

<script src="script.js"></script>
 

</body>
   <footer class="footer">
  <p>
    Built by <span class="name">Anvesha Mishra</span> •

      Connect on LinkedIn
    </a>
  </p>
     </footer>
</html>
