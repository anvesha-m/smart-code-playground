<div class="container">
  <h1>💻 Smart Code Playground</h1>

  <textarea id="code"></textarea>

  <div class="btns">
    <button onclick="runCode()">▶ Run</button>
    <button onclick="analyzeCode()">🧠 Analyze</button>
    <button onclick="loadChallenge()">🎯 Challenge</button>
    <button onclick="copyCode()">📋 Copy</button>
  </div>

  <div class="section">
    <h2>Output</h2>
    <pre id="output"></pre>
  </div>

  <div class="section">
    <h2>Explanation</h2>
    <div class="card" id="analysis"></div>
  </div>

  <div class="section">
    <h2>Suggestions</h2>
    <div class="card" id="suggestions"></div>
  </div>

  <div class="section">
    <h2>Challenge</h2>
    <div class="card" id="challenge"></div>
  </div>

  <div class="section">
    <h2>Quiz</h2>
    <div class="card" id="quiz"></div>
  </div>

  <p id="score"></p>
</div>
